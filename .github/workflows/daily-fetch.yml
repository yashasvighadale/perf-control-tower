name: Daily Meta Ads Snapshot

on:
  schedule:
    - cron: '30 20 * * *'   # 8:30 PM UTC = 2:00 AM IST
  workflow_dispatch:          # Manual trigger for testing / backfills
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD). Leave blank for yesterday.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily fetch
        env:
          META_TOKEN:    ${{ secrets.META_TOKEN }}
          ACCOUNT_ID:    ${{ secrets.ACCOUNT_ID }}
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            node scripts/fetch-data.js --date "${{ github.event.inputs.date }}"
          else
            node scripts/fetch-data.js
          fi

      - name: Commit snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: daily snapshot $(date -u +%Y-%m-%d)"
          git push
